apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "envproxy.agent.fullname" . }}
  labels:
    {{- include "envproxy.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      {{- include "envproxy.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        {{- include "envproxy.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "envproxy.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: envproxy-agent
          image: "{{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag }}"
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          args:
            - --config
            - /etc/envproxy/config.toml
          volumeMounts:
            - name: socket-dir
              mountPath: {{ .Values.agent.socket.hostPath }}
            - name: config
              mountPath: /etc/envproxy
              readOnly: true
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "test -S {{ .Values.agent.socket.hostPath }}/agent.sock"
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "test -S {{ .Values.agent.socket.hostPath }}/agent.sock"
            initialDelaySeconds: 2
            periodSeconds: 5
      volumes:
        - name: socket-dir
          hostPath:
            path: {{ .Values.agent.socket.hostPath }}
            type: DirectoryOrCreate
        - name: config
          configMap:
            name: {{ include "envproxy.agent.fullname" . }}-config
      {{- with .Values.agent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
