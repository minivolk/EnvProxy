# envproxy Helm chart values

# -- envproxy container image (used for init container + sidecar agent)
envproxy:
  image:
    repository: ghcr.io/minivolk/envproxy
    tag: latest
    pullPolicy: IfNotPresent

# -- envproxy-injector webhook configuration
injector:
  enabled: true

  image:
    repository: ghcr.io/minivolk/envproxy-injector
    tag: latest
    pullPolicy: Always

  # -- Default cache TTL in seconds for Python/Java
  defaultCacheTTL: "30"

  # -- Webhook failure policy: Ignore or Fail
  failurePolicy: Ignore

  # -- Namespace selector: only pods in namespaces with this label are eligible
  namespaceSelector:
    matchLabels:
      envproxy.dev/injection: enabled

  replicas: 1

  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# -- TLS configuration for the webhook
tls:
  certManager:
    enabled: false
    issuerKind: Issuer
    issuerName: envproxy-selfsigned

# -- Image pull secrets for private registries
imagePullSecrets:
  - name: ghcr-pull-secret

# -- ServiceAccount configuration
serviceAccount:
  create: true
  name: ""
  annotations: {}
