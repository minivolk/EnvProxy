# envproxy Helm chart values

# -- envproxy container image (used for init container + sidecar agent)
envproxy:
  image:
    repository: ghcr.io/minivolk/envproxy
    tag: latest
    pullPolicy: IfNotPresent

  # -- Default resource limits/requests for the sidecar agent container.
  # Can be overridden per-pod with annotations:
  #   envproxy.dev/agent-cpu-limit: "200m"
  #   envproxy.dev/agent-memory-limit: "256Mi"
  #   envproxy.dev/agent-cpu-request: "50m"
  #   envproxy.dev/agent-memory-request: "64Mi"
  agent:
    resources:
      limits:
        cpu: 50m
        memory: 64Mi
      requests:
        cpu: 10m
        memory: 32Mi

# -- envproxy-injector webhook configuration
injector:
  enabled: true

  image:
    repository: ghcr.io/minivolk/envproxy-injector
    tag: latest
    pullPolicy: Always

  # -- Default cache TTL in seconds for Python/Java
  defaultCacheTTL: "30"

  # -- Webhook failure policy: Ignore or Fail
  failurePolicy: Ignore

  # -- Namespace selector: only pods in namespaces with this label are eligible
  namespaceSelector:
    matchLabels:
      envproxy.dev/injection: enabled

  replicas: 1

  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# -- TLS configuration for the webhook
tls:
  certManager:
    enabled: false
    issuerKind: Issuer
    issuerName: envproxy-selfsigned

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- ServiceAccount configuration
serviceAccount:
  create: true
  name: ""
  annotations: {}
