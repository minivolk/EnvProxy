# Image pull secret for private container registries (e.g., ghcr.io).
#
# WARNING: Never commit real credentials. This is a template.
#
# To create your own:
#   kubectl create secret docker-registry ghcr-pull-secret \
#     --docker-server=ghcr.io \
#     --docker-username=<YOUR_GITHUB_USERNAME> \
#     --docker-password=<YOUR_GITHUB_PAT> \
#     -n envproxy
#
# Or apply this file after replacing the placeholder:
#   echo -n '{"auths":{"ghcr.io":{"auth":"<BASE64_USER:TOKEN>"}}}' | base64
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull-secret
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <YOUR_BASE64_ENCODED_DOCKERCONFIGJSON>
