# Example: Python pod with envproxy injection.
# The webhook automatically:
#   1. Adds an init container that copies envproxy binaries
#   2. Wraps the entrypoint with "envproxy run --"
#   3. Sets LD_PRELOAD, PYTHONPATH, ENVPROXY_SOCKET env vars
#   4. Mounts the agent socket and binary volumes
#
# Prerequisites:
#   - envproxy Helm chart installed
#   - Namespace labeled: kubectl label ns default envproxy.dev/injection=enabled
#   - Secret created: kubectl apply -f secret.yaml
apiVersion: v1
kind: Pod
metadata:
  name: python-app
  annotations:
    envproxy.dev/inject: "true"
    envproxy.dev/cache-ttl: "10"
spec:
  containers:
    - name: app
      image: python:3.12-slim
      command: ["python3", "-c"]
      args:
        - |
          import os, time, sys
          print(f"envproxy python-app started (os.environ type: {type(os.environ).__name__})", flush=True)
          while True:
              db = os.getenv("DATABASE_URL", "<NOT SET>")
              api = os.getenv("API_KEY", "<NOT SET>")
              print(f"DATABASE_URL = {db}", flush=True)
              print(f"API_KEY = {api}", flush=True)
              sys.stdout.flush()
              time.sleep(5)
