# WARNING: These are EXAMPLE values for testing. Never commit real secrets to git.
#
# Example Kubernetes Secret that envproxy-agent reads from.
# The agent serves these key-value pairs as environment variables
# to any pod on the node that queries via the Unix socket.
apiVersion: v1
kind: Secret
metadata:
  name: envproxy-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgres://user:secret@db.internal:5432/mydb"
  API_KEY: "sk-envproxy-k8s-demo-1234567890"
  REDIS_URL: "redis://redis.internal:6379/0"
  JWT_SECRET: "super-secret-jwt-signing-key-k8s"
