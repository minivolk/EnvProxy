[tools]
rust = "latest"
python = "3.12"
node = "22"
java = "21"

[env]
RUST_BACKTRACE = "1"
ENVPROXY_CACHE_TTL = "5"

_.path = ["./target/release", "./target/debug"]

[tasks.build]
description = "Build all crates (debug)"
run = "cargo build"

[tasks."build:release"]
description = "Build all crates (optimized)"
run = "cargo build --release"

[tasks.test]
description = "Run Rust unit tests"
run = "cargo test"

[tasks.lint]
description = "Run clippy with strict warnings"
run = "cargo clippy --all-targets --all-features -- -D warnings"

[tasks.fmt]
description = "Format all Rust code"
run = "cargo fmt --all"

[tasks."fmt:check"]
description = "Check Rust formatting (CI)"
run = "cargo fmt --all -- --check"

[tasks.ci]
description = "Full CI pipeline: format check, lint, test"
depends = ["fmt:check", "lint", "test"]

[tasks."build:java"]
description = "Build the Java agent JAR"
run = "bash support/java/build.sh"

[tasks.agent]
description = "Start envproxy-agent with example config (foreground)"
run = "cargo run -p envproxy-agent -- --config examples/config.toml"

[tasks."agent:bg"]
description = "Start envproxy-agent in background, wait for socket"
run = """
#!/usr/bin/env bash
set -euo pipefail
mkdir -p /tmp/envproxy
cargo build --release -q
target/release/envproxy-agent --config examples/config.toml &
AGENT_PID=$!
echo "$AGENT_PID" > /tmp/envproxy/agent.pid
for i in $(seq 1 20); do
  [ -S /tmp/envproxy/agent.sock ] && break
  sleep 0.1
done
echo "Agent started (PID $AGENT_PID)"
"""

[tasks."agent:stop"]
description = "Stop background envproxy-agent"
run = """
#!/usr/bin/env bash
if [ -f /tmp/envproxy/agent.pid ]; then
  kill "$(cat /tmp/envproxy/agent.pid)" 2>/dev/null || true
  rm -f /tmp/envproxy/agent.pid
  echo "Agent stopped."
else
  echo "No agent PID file found."
fi
"""

[tasks.demo]
description = "Run the Python demo (start agent first with: mise run agent)"
run = """
#!/usr/bin/env bash
set -euo pipefail
cargo build --release -q
ENVPROXY_CACHE_TTL=5 \
LD_PRELOAD="$(pwd)/target/release/libenvproxy.so" \
python3 examples/python/demo.py
"""

[tasks."demo:python"]
description = "Run a Python env polling loop (start agent first with: mise run agent)"
run = """
#!/usr/bin/env bash
set -euo pipefail
cargo build --release -q
ENVPROXY_CACHE_TTL=5 \
LD_PRELOAD="$(pwd)/target/release/libenvproxy.so" \
python3 examples/python/poll.py
"""

[tasks."demo:java"]
description = "Run the Java demo (start agent first with: mise run agent)"
run = """
#!/usr/bin/env bash
set -euo pipefail
cargo build --release -q
mkdir -p /tmp/envproxy
javac -d /tmp/envproxy examples/java/Demo.java
ENVPROXY_CACHE_TTL=5 \
LD_PRELOAD="$(pwd)/target/release/libenvproxy.so" \
java -cp /tmp/envproxy Demo
"""

[tasks."demo:node"]
description = "Run the Node.js demo (start agent first with: mise run agent)"
run = """
#!/usr/bin/env bash
set -euo pipefail
cargo build --release -q
LD_PRELOAD="$(pwd)/target/release/libenvproxy.so" \
node examples/node/demo.mjs
"""

[tasks."demo:c"]
description = "Run the C demo (start agent first with: mise run agent)"
run = """
#!/usr/bin/env bash
set -euo pipefail
cargo build --release -q
mkdir -p /tmp/envproxy
cc -o /tmp/envproxy/demo_c examples/c/demo.c
LD_PRELOAD="$(pwd)/target/release/libenvproxy.so" \
/tmp/envproxy/demo_c
"""
